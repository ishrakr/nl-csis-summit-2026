<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NLU CSIS Tech Summit 2026</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <p class="eyebrow">NLU CSIS Tech Summit 2026</p>
        <h1>Rate my Presentation</h1>

        <div class="qr-panel">
          <a class="qr-link" href="https://SERVICE_FQDN_APP" aria-label="Open rating page at https://SERVICE_FQDN_APP">
            <img class="qr-code" src="/qrcode.svg" alt="QR code for https://SERVICE_FQDN_APP" />
          </a>
          <p class="qr-caption">Scan to Join</p>
          <p class="qr-url">https://SERVICE_FQDN_APP</p>
        </div>

        <div class="emoji-row" aria-label="Emoji reactions">
          <button class="emoji-button" data-emoji="😍" aria-label="Love">😍</button>
          <button class="emoji-button" data-emoji="👏" aria-label="Clap">👏</button>
          <button class="emoji-button" data-emoji="🔥" aria-label="Fire">🔥</button>
          <button class="emoji-button" data-emoji="💩" aria-label="Poop">💩</button>
          <button class="emoji-button" data-emoji="⭐" aria-label="Star">⭐</button>
        </div>

        <p class="status" id="status">0</p>
      </section>

      <div id="float-layer" class="float-layer" aria-hidden="true"></div>
    </main>

    <script src="/client.js"></script>
  </body>
</html>
